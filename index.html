<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Country Explorer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="top-bar">
    <h1>🌍 Country Explorer</h1>
    <button id="themeToggle">🌙 Dark Mode</button>
  </div>

  <div class="controls">
    <input type="text" id="searchInput" placeholder="Search country...">

    <select id="regionFilter">
      <option value="all">All Regions</option>
      <option value="africa">Africa</option>
      <option value="asia">Asia</option>
      <option value="europe">Europe</option>
      <option value="americas">Americas</option>
      <option value="oceania">Oceania</option>
    </select>

    <select id="sortOption">
      <option value="default">Sort By</option>
      <option value="name-asc">Name A-Z</option>
      <option value="name-desc">Name Z-A</option>
      <option value="population-asc">Population Low-High</option>
      <option value="population-desc">Population High-Low</option>
    </select>

    <select id="favoriteFilter">
      <option value="all">All Countries</option>
      <option value="favorites">Favorites Only</option>
    </select>
  </div>

  <p id="status"></p>
  <p id="favoriteCount">⭐ Favorite Countries: 0</p>

  <div id="countriesContainer"></div>

  <script src="script.js"></script>
</body>
</html>
